<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小途 · 智能旅行助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- marked.js: 客户端 Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <!-- ===== Header ===== -->
    <header class="header">
        <span class="logo">🌍</span>
        <div>
            <div class="title">小途 · 智能旅行助手</div>
            <div class="subtitle">AI-Powered Travel Assistant</div>
        </div>
        <button class="reset-btn" id="resetBtn">🔄 新的旅程</button>
    </header>

    <!-- ===== Chat Container ===== -->
    <div class="chat-container" id="chatContainer">

        <!-- Welcome Card -->
        <div class="welcome" id="welcomeCard">
            <div class="welcome-icon">🌍</div>
            <h2>你好！我是小途，你的智能旅行助手 ✈️</h2>
            <p>我可以查询天气、搜索目的地美图、规划详细行程。<br>试着告诉我你的旅行想法吧～</p>
            <div class="quick-actions">
                <button class="quick-btn">🏖️ 三亚3天度假行程</button>
                <button class="quick-btn">🏔️ 丽江大理5天深度游</button>
                <button class="quick-btn">🍜 成都美食之旅4天</button>
                <button class="quick-btn">🏯 西安历史文化3日游</button>
            </div>
        </div>

    </div>

    <!-- ===== Loading (global template for clone) ===== -->
    <!-- loaded dynamically via JS -->

    <!-- ===== Input Area ===== -->
    <div class="input-area">
        <textarea id="messageInput" rows="1" placeholder="输入你的旅行需求，比如「杭州3天行程，先看看天气」..."></textarea>
        <button id="sendBtn" title="发送 (Enter)">➤</button>
    </div>

    <!-- ===== Footer ===== -->
    <div class="footer">
        🌤️ 高德天气 · 📸 Unsplash 图片 · 🤖 通义千问 AI 规划
    </div>

    <!-- ===== Image Lightbox ===== -->
    <div class="image-modal" id="imageModal">
        <img id="modalImg" src="" alt="目的地实景照片">
    </div>

    <!-- ===== JS ===== -->
    <script src="/static/app.js"></script>
</body>
</html>
